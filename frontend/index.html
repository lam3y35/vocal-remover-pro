<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocal Remover Pro - إزالة الأصوات من الموسيقى</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            background: #f5f5f5;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #e0e0e0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafaff;
        }

        .upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e0ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3em;
            color: #555;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #888;
            font-size: 0.95em;
        }

        #fileInput {
            display: none;
        }

        .url-input-container {
            margin-top: 20px;
        }

        .url-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s ease;
        }

        .url-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .separate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3em;
            cursor: pointer;
            margin-top: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: 600;
        }

        .separate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .separate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            margin-top: 30px;
            display: none;
        }

        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 10px;
            height: 25px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-text {
            text-align: center;
            font-size: 1.1em;
            color: #555;
            margin-bottom: 10px;
        }

        .job-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.95em;
        }

        .download-section {
            margin-top: 30px;
            display: none;
        }

        .download-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            transition: transform 0.3s ease;
            margin: 10px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }

        .cancel-btn {
            padding: 12px 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
            font-weight: 600;
        }

        .cancel-btn:hover {
            background: #ff5252;
        }

        .settings-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .settings-title {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting-label {
            font-weight: 600;
            color: #555;
        }

        .setting-select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
        }

        .setting-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            margin-right: 10px;
        }

        .status-pending { background: #ffeaa7; color: #d63031; }
        .status-running { background: #74b9ff; color: #0984e3; }
        .status-completed { background: #55efc4; color: #00b894; }
        .status-failed { background: #fab1a0; color: #d63031; }
        .status-cancelled { background: #b2bec3; color: #636e72; }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙 Vocal Remover Pro</h1>
        <p class="subtitle">افصل الأصوات عن الموسيقى الاحترافية بسهولة</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('file')">📁 رفع ملف</button>
            <button class="tab-btn" onclick="switchTab('url')">🔗 رابط URL</button>
        </div>

        <!-- File Upload Tab -->
        <div id="file-tab" class="tab-content active">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">🎵</div>
                <div class="upload-text">اسحب الملف وأفلته هنا</div>
                <div class="upload-hint">أو انقر لاختيار ملف (MP3, WAV, FLAC, M4A)</div>
                <input type="file" id="fileInput" accept="audio/*" onchange="handleFileSelect(event)">
            </div>
            <div id="selectedFileName" style="margin-top: 15px; text-align: center; color: #667eea; font-weight: 600;"></div>
        </div>

        <!-- URL Tab -->
        <div id="url-tab" class="tab-content">
            <div class="url-input-container">
                <input type="text" id="urlInput" class="url-input" placeholder="أدخل رابط YouTube أو أي رابط صوتي...">
            </div>
        </div>

        <button class="separate-btn" id="separateBtn" onclick="startSeparation()">
            🎯 بدء الفصل (Separation)
        </button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-text" id="progressText">جاري المعالجة... 0%</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <div class="job-info">
                <span class="status-badge status-pending" id="statusBadge">قيد الانتظار</span>
                <span id="jobMessage">جاري التحضير...</span>
            </div>
            <button class="cancel-btn" id="cancelBtn" onclick="cancelJob()">❌ إلغاء</button>
        </div>

        <div class="download-section" id="downloadSection">
            <h3 style="text-align: center; margin-bottom: 20px; color: #667eea;">✅ اكتمل الفصل بنجاح!</h3>
            <div style="text-align: center;">
                <a href="#" class="download-btn" id="downloadVocals">🎤 تحميل الأصوات</a>
                <a href="#" class="download-btn" id="downloadInstrumental">🎹 تحميل الموسيقى</a>
            </div>
        </div>

        <div class="settings-section">
            <h3 class="settings-title">⚙ الإعدادات</h3>
            
            <div class="setting-row">
                <span class="setting-label">نموذج الذكاء الاصطناعي:</span>
                <select class="setting-select" id="modelSelect">
                    <option value="htdemucs_ft">HTDemucs FT (الأفضل)</option>
                    <option value="htdemucs">HTDemucs (سريع)</option>
                    <option value="mdx">MDX (دقيق)</option>
                    <option value="demucs">Demucs (أساسي)</option>
                </select>
            </div>

            <div class="setting-row">
                <span class="setting-label">صيغة الإخراج:</span>
                <select class="setting-select" id="formatSelect">
                    <option value="wav">WAV (جودة عالية)</option>
                    <option value="mp3">MP3 (حجم صغير)</option>
                    <option value="flac">FLAC (بدون فقدان)</option>
                </select>
            </div>

            <div class="setting-row">
                <span class="setting-label">مدة الجزء:</span>
                <select class="setting-select" id="segmentSelect">
                    <option value="8">8 ثواني (افتراضي)</option>
                    <option value="4">4 ثواني (للأجهزة الضعيفة)</option>
                    <option value="12">12 ثانية (للأجهزة القوية)</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let eventSource = null;
        let selectedFile = null;

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`.tab-btn:nth-child(${tab === 'file' ? 1 : 2})`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFile(file) {
            selectedFile = file;
            document.getElementById('selectedFileName').textContent = `📄 ${file.name}`;
        }

        // Get config from settings
        function getConfig() {
            return {
                model_name: document.getElementById('modelSelect').value,
                output_format: document.getElementById('formatSelect').value,
                segment: parseFloat(document.getElementById('segmentSelect').value),
                overlap: 1.0,
                shifts: 3,
                output_all_stems: false,
                device: 'auto',
                audio_bitrate: '256k',
                adaptive_mode: true,
                long_file_mode: 'auto',
                chunk_minutes: 10,
            };
        }

        // Start separation
        async function startSeparation() {
            const activeTab = document.querySelector('.tab-btn.active').textContent.includes('ملف') ? 'file' : 'url';
            
            if (activeTab === 'file') {
                if (!selectedFile) {
                    alert('الرجاء اختيار ملف أولاً!');
                    return;
                }
                await uploadAndSeparate(selectedFile);
            } else {
                const url = document.getElementById('urlInput').value.trim();
                if (!url) {
                    alert('الرجاء إدخال رابط URL!');
                    return;
                }
                await separateUrl(url);
            }
        }

        // Upload file and separate
        async function uploadAndSeparate(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('config_json', JSON.stringify(getConfig()));

            try {
                const response = await fetch('/api/separate', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    throw new Error('فشل رفع الملف');
                }

                const data = await response.json();
                currentJobId = data.job_id;
                startProgressStream(currentJobId);
                
            } catch (error) {
                alert('حدث خطأ: ' + error.message);
            }
        }

        // Separate from URL
        async function separateUrl(url) {
            const formData = new FormData();
            formData.append('url', url);
            formData.append('config_json', JSON.stringify(getConfig()));

            try {
                const response = await fetch('/api/separate-url', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    throw new Error('فشل معالجة الرابط');
                }

                const data = await response.json();
                currentJobId = data.job_id;
                startProgressStream(currentJobId);
                
            } catch (error) {
                alert('حدث خطأ: ' + error.message);
            }
        }

        // Start SSE progress stream
        function startProgressStream(jobId) {
            document.getElementById('separateBtn').disabled = true;
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('downloadSection').style.display = 'none';

            const eventSource = new EventSource(`/api/progress/${jobId}`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.error) {
                    eventSource.close();
                    alert('خطأ: ' + data.error);
                    resetUI();
                    return;
                }

                updateProgress(data);

                if (data.status === 'completed') {
                    eventSource.close();
                    showDownload(jobId);
                } else if (data.status === 'failed' || data.status === 'cancelled') {
                    eventSource.close();
                    alert('فشلت العملية: ' + data.message);
                    resetUI();
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
                alert('حدث خطأ في الاتصال');
                resetUI();
            };
        }

        // Update progress UI
        function updateProgress(data) {
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const statusBadge = document.getElementById('statusBadge');
            const jobMessage = document.getElementById('jobMessage');

            progressBar.style.width = data.progress + '%';
            progressText.textContent = `جاري المعالجة... ${data.progress}%`;
            jobMessage.textContent = data.message || 'جاري العمل...';

            // Update status badge
            statusBadge.className = 'status-badge status-' + data.status;
            const statusTexts = {
                'pending': 'قيد الانتظار',
                'running': 'جاري المعالجة',
                'completed': 'مكتمل',
                'failed': 'فشل',
                'cancelled': 'ملغى'
            };
            statusBadge.textContent = statusTexts[data.status] || data.status;
        }

        // Show download section
        function showDownload(jobId) {
            document.getElementById('downloadSection').style.display = 'block';
            document.getElementById('downloadVocals').href = `/api/download/${jobId}`;
            document.getElementById('downloadInstrumental').href = `/api/stems/${jobId}/instrumental`;
        }

        // Cancel job
        async function cancelJob() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/api/job/${currentJobId}`, {
                    method: 'DELETE',
                });

                if (response.ok) {
                    alert('تم إلغاء العملية');
                    if (eventSource) {
                        eventSource.close();
                    }
                    resetUI();
                }
            } catch (error) {
                alert('فشل الإلغاء: ' + error.message);
            }
        }

        // Reset UI
        function resetUI() {
            document.getElementById('separateBtn').disabled = false;
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('downloadSection').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
            currentJobId = null;
            selectedFile = null;
            document.getElementById('selectedFileName').textContent = '';
            document.getElementById('urlInput').value = '';
        }

        // Auto-check system on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/system');
                const system = await response.json();
                console.log('System info:', system);
            } catch (error) {
                console.log('Could not fetch system info');
            }
        });
    </script>
</body>
</html>
